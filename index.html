<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YanzMods - Email Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YANZMODS EMAIL VIEWER</h1>
            <p>© RianModss - Quantum V13.0</p>
        </div>
        
        <div class="login-box">
            <h2>Masukkan Email</h2>
            <form action="view.php" method="POST">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" required placeholder="email@gmail.com">
                </div>
                
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password" required placeholder="password">
                </div>
                
                <div class="form-group">
                    <label>Server:</label>
                    <select name="server">
                        <option value="gmail">Gmail</option>
                        <option value="yahoo">Yahoo</option>
                        <option value="outlook">Outlook</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">LIHAT PESAN</button>
            </form>
        </div>
    </div>
</body>
</html>
